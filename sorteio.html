<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rifa 3º Ano — Sistema Completo</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{--red:#D72638;--blue:#1A3A6B;--white:#F5F5F5;--dark:#0D1F3C;--gold:#FFD700;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito',sans-serif;background:var(--dark);color:var(--white);min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;z-index:0;background:repeating-linear-gradient(45deg,rgba(215,38,56,.05) 0,rgba(215,38,56,.05) 1px,transparent 1px,transparent 40px),repeating-linear-gradient(-45deg,rgba(26,58,107,.09) 0,rgba(26,58,107,.09) 1px,transparent 1px,transparent 40px)}
  .wrapper{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:2rem 1.2rem 4rem}

  /* NAV TABS */
  .nav-tabs{display:flex;gap:.6rem;margin-bottom:1.8rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:10px;padding:.5rem}
  .nav-tab{flex:1;padding:.75rem;border:none;border-radius:7px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.85rem;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .2s;background:transparent;color:#889}
  .nav-tab.active{background:var(--red);color:#fff;box-shadow:0 3px 14px rgba(215,38,56,.4)}

  /* PAGE SECTIONS */
  .page{display:none}
  .page.active{display:block}

  header{text-align:center;padding:2.5rem 0 1rem}
  .badge{display:inline-block;background:var(--red);color:#fff;font-size:.72rem;font-weight:900;letter-spacing:.14em;text-transform:uppercase;padding:.35rem 1rem;border-radius:2px;margin-bottom:1rem}
  header h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,10vw,5.5rem);letter-spacing:.04em;line-height:1;color:var(--white);text-shadow:4px 4px 0 var(--red)}
  header h1 span{color:var(--red)}
  header p.sub{margin-top:.7rem;font-size:.9rem;color:#aac;font-weight:600;letter-spacing:.05em}

  .stripe{display:flex;height:6px;margin:1.6rem 0;border-radius:3px;overflow:hidden}
  .stripe span{flex:1}
  .stripe span:nth-child(1){background:var(--red)}
  .stripe span:nth-child(2){background:var(--white)}
  .stripe span:nth-child(3){background:var(--blue)}

  .card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:12px;padding:1.8rem 2rem;margin-bottom:1.4rem;backdrop-filter:blur(6px)}
  .step-label{font-size:.68rem;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:var(--red);margin-bottom:.5rem}
  .card h2{font-family:'Bebas Neue',sans-serif;font-size:1.55rem;letter-spacing:.06em;color:var(--white);margin-bottom:1.1rem}

  .turma-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
  .turma-btn{position:relative;padding:1.4rem 1rem;border:none;border-radius:10px;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.08em;transition:transform .15s,box-shadow .15s;overflow:hidden}
  .turma-btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.12);opacity:0;transition:opacity .15s}
  .turma-btn:hover{transform:translateY(-3px)}
  .turma-btn:hover::after{opacity:1}
  .turma-btn.a{background:linear-gradient(135deg,var(--blue),#2557A7);color:#fff;box-shadow:0 4px 20px rgba(26,58,107,.5)}
  .turma-btn.b{background:linear-gradient(135deg,var(--red),#B01D2B);color:#fff;box-shadow:0 4px 20px rgba(215,38,56,.5)}
  .turma-btn small{display:block;font-family:'Nunito',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.1em;opacity:.8;margin-top:.2rem}
  .turma-btn.selected{outline:3px solid var(--white);outline-offset:3px}

  .search-wrap{position:relative}
  .search-wrap input{width:100%;padding:.85rem 1rem .85rem 3rem;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.15);border-radius:8px;color:var(--white);font-family:'Nunito',sans-serif;font-size:1rem;font-weight:600;outline:none;transition:border-color .2s}
  .search-wrap input::placeholder{color:#778}
  .search-wrap input:focus{border-color:var(--red)}
  .search-wrap .icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);font-size:1.1rem;pointer-events:none}

  #nameList{margin-top:.8rem;max-height:260px;overflow-y:auto;border-radius:8px;border:1px solid rgba(255,255,255,.08)}
  #nameList::-webkit-scrollbar{width:5px}
  #nameList::-webkit-scrollbar-thumb{background:var(--blue);border-radius:10px}
  .name-item{padding:.75rem 1.1rem;cursor:pointer;font-weight:700;font-size:.88rem;letter-spacing:.03em;border-bottom:1px solid rgba(255,255,255,.05);transition:background .12s;display:flex;align-items:center;gap:.6rem}
  .name-item:last-child{border-bottom:none}
  .name-item:hover{background:rgba(215,38,56,.18)}
  .name-item .num{color:#556;font-size:.75rem;font-weight:900;width:2em;text-align:right;flex-shrink:0}

  #ticketSection{display:none}
  #ticketCard{background:linear-gradient(145deg,var(--blue) 0%,var(--dark) 100%);border:2px solid rgba(255,255,255,.15);border-radius:16px;padding:2rem;position:relative;overflow:hidden}
  #ticketCard::before{content:'🎟';position:absolute;font-size:14rem;opacity:.04;right:-2rem;top:-2rem;pointer-events:none}

  .ticket-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem}
  .ticket-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.08em;line-height:1.1}
  .ticket-title span{color:var(--red)}
  .ticket-turma-badge{background:var(--red);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.1em;padding:.3rem .8rem;border-radius:6px}

  .unique-badge{display:inline-flex;align-items:center;gap:.4rem;background:rgba(0,200,80,.12);border:1px solid rgba(0,200,80,.3);color:#4dff91;border-radius:20px;padding:.25rem .8rem;font-size:.7rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.9rem}

  .ticket-name{font-weight:900;font-size:1.1rem;color:#fff;letter-spacing:.04em;margin-bottom:.3rem}
  .ticket-name small{color:#aac;font-size:.78rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:.2rem}

  .ticket-info{display:flex;gap:1.5rem;margin:1rem 0 1.4rem;padding:.9rem 1rem;background:rgba(255,255,255,.05);border-radius:8px;border:1px solid rgba(255,255,255,.08)}
  .ticket-info div{text-align:center}
  .ticket-info .val{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--red);letter-spacing:.05em}
  .ticket-info .lbl{font-size:.68rem;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:#889}

  .number-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:.6rem;margin-bottom:1.5rem}
  .rifa-num{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.14);border-radius:8px;text-align:center;padding:.65rem .3rem;font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.06em;color:var(--white);transition:transform .2s,background .2s;animation:popIn .35s both}
  .rifa-num:hover{transform:scale(1.06);background:rgba(215,38,56,.25)}
  .rifa-num .tag{font-family:'Nunito',sans-serif;font-size:.6rem;font-weight:900;letter-spacing:.08em;color:#778;text-transform:uppercase;display:block}
  @keyframes popIn{from{opacity:0;transform:scale(.7) rotate(-4deg)}to{opacity:1;transform:scale(1) rotate(0)}}

  .ticket-footer{display:flex;justify-content:center;align-items:center;gap:.5rem;padding-top:1rem;border-top:1px dashed rgba(255,255,255,.12);font-size:.75rem;color:#778;font-weight:700;letter-spacing:.08em;text-transform:uppercase}

  .btn-group{display:flex;gap:.8rem;margin-top:1.2rem;flex-wrap:wrap}
  .btn{flex:1;padding:.85rem 1.5rem;border:none;border-radius:8px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.88rem;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:transform .15s,box-shadow .15s;display:flex;align-items:center;justify-content:center;gap:.5rem}
  .btn:hover{transform:translateY(-2px)}
  .btn-export{background:linear-gradient(135deg,var(--red),#B01D2B);color:#fff;box-shadow:0 4px 18px rgba(215,38,56,.45)}
  .btn-back{background:rgba(255,255,255,.08);color:#ccd;border:1.5px solid rgba(255,255,255,.12)}

  /* EXPORT CARD */
  #exportCard{position:fixed;left:-9999px;top:0;width:760px;background:var(--dark);font-family:'Nunito',sans-serif}
  .ec-top{background:linear-gradient(135deg,var(--blue) 0%,#0D1F3C 60%);padding:2.4rem 2.4rem 1.8rem;position:relative;overflow:hidden}
  .ec-top::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--red),var(--white),var(--blue))}
  .ec-logo{display:flex;align-items:center;gap:.8rem;margin-bottom:1.4rem}
  .ec-logo .dot{width:14px;height:14px;border-radius:50%}
  .ec-logo .dot.r{background:var(--red)}
  .ec-logo .dot.w{background:var(--white)}
  .ec-logo .dot.b{background:var(--blue)}
  .ec-logo span{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.12em;color:rgba(255,255,255,.5)}
  .ec-title{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:.06em;color:var(--white);line-height:1}
  .ec-title span{color:var(--red)}
  .ec-sub{font-size:.82rem;color:#aab;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-top:.3rem}
  .ec-body{padding:1.8rem 2.4rem 2.2rem}
  .ec-owner{margin-bottom:.8rem}
  .ec-owner .lbl{font-size:.68rem;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:var(--red);margin-bottom:.2rem}
  .ec-owner .name{font-size:1.4rem;font-weight:900;color:var(--white);letter-spacing:.04em}
  .ec-owner .turma{font-size:.85rem;color:#aab;font-weight:700}
  .ec-unique{display:inline-flex;align-items:center;gap:.4rem;background:rgba(0,200,80,.1);border:1px solid rgba(0,200,80,.25);color:#4dff91;border-radius:20px;padding:.2rem .7rem;font-size:.65rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;margin:.5rem 0 1rem}
  .ec-nums{display:grid;grid-template-columns:repeat(5,1fr);gap:.7rem;margin-bottom:1.2rem}
  .ec-num{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.13);border-radius:10px;text-align:center;padding:.8rem .4rem}
  .ec-num .tag2{font-size:.6rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:#667;display:block;margin-bottom:.2rem}
  .ec-num .n{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--white);letter-spacing:.06em;display:block}
  .ec-price-row{display:flex;align-items:center;justify-content:space-between;background:rgba(215,38,56,.12);border:1.5px solid rgba(215,38,56,.25);border-radius:10px;padding:1rem 1.4rem;margin-bottom:1.6rem}
  .ec-price-row .pl{font-size:.75rem;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:#aab}
  .ec-price-row .pr{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:var(--red);letter-spacing:.06em}
  .ec-footer{display:flex;justify-content:space-between;align-items:center;border-top:1px dashed rgba(255,255,255,.1);padding-top:1.2rem;font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#556}
  .ec-stripe{display:flex;height:5px;border-radius:3px;overflow:hidden}
  .ec-stripe span{flex:1}
  .ec-stripe span:nth-child(1){background:var(--red)}
  .ec-stripe span:nth-child(2){background:var(--white)}
  .ec-stripe span:nth-child(3){background:var(--blue)}

  /* ── SORTEIO PAGE ── */
  .drum-wrap{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:2.5rem 2rem;text-align:center;margin-bottom:1.4rem;backdrop-filter:blur(6px);position:relative;overflow:hidden}
  .drum-wrap::before{content:'🎟';position:absolute;font-size:12rem;opacity:.04;right:-2rem;top:-2rem;pointer-events:none}
  .drum-label{font-size:.68rem;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:var(--red);margin-bottom:.6rem}

  .slot-window{position:relative;width:260px;height:110px;margin:0 auto 1.6rem;border-radius:14px;overflow:hidden;border:2px solid rgba(255,255,255,.15);background:rgba(0,0,0,.35)}
  .slot-window::before,.slot-window::after{content:'';position:absolute;left:0;right:0;height:34px;z-index:2;pointer-events:none}
  .slot-window::before{top:0;background:linear-gradient(to bottom,rgba(13,31,60,1),rgba(13,31,60,0))}
  .slot-window::after{bottom:0;background:linear-gradient(to top,rgba(13,31,60,1),rgba(13,31,60,0))}
  .slot-track{display:flex;flex-direction:column;align-items:center;will-change:transform}
  .slot-num{font-family:'Bebas Neue',sans-serif;font-size:4.5rem;line-height:110px;color:var(--white);letter-spacing:.06em;height:110px;width:100%;text-align:center;flex-shrink:0}
  .slot-line{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:110px;border-top:2px solid rgba(215,38,56,.4);border-bottom:2px solid rgba(215,38,56,.4);z-index:1;pointer-events:none}

  .btn-sortear{margin-top:.4rem;padding:1.1rem 3rem;background:linear-gradient(135deg,var(--red),#B01D2B);color:#fff;border:none;border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.1em;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 24px rgba(215,38,56,.45)}
  .btn-sortear:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(215,38,56,.55)}
  .btn-sortear:active{transform:scale(.97)}
  .btn-sortear:disabled{opacity:.5;cursor:not-allowed;transform:none}

  #resultSection{display:none;animation:slideUp .5s cubic-bezier(.34,1.56,.64,1) both}
  @keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}

  .result-card{background:linear-gradient(145deg,var(--blue),var(--dark));border:2px solid rgba(255,255,255,.15);border-radius:16px;padding:2rem;position:relative;overflow:hidden;text-align:center}
  .result-card::before{content:'🏆';position:absolute;font-size:12rem;opacity:.06;left:-2rem;top:-2rem;pointer-events:none}

  .winner-number{font-family:'Bebas Neue',sans-serif;font-size:clamp(4rem,18vw,7rem);letter-spacing:.06em;color:var(--white);text-shadow:0 0 40px rgba(215,38,56,.5);line-height:1;margin-bottom:.3rem}
  .winner-label{font-size:.68rem;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:var(--red);margin-bottom:1.2rem}

  .winner-info{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,215,0,.25);border-radius:12px;padding:1.4rem;margin:1rem 0 1.4rem}
  .winner-info .wi-label{font-size:.65rem;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:.4rem}
  .winner-info .wi-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.4rem,5vw,2.4rem);letter-spacing:.06em;color:var(--white);line-height:1.15;margin-bottom:.3rem}
  .winner-info .wi-turma{font-size:.8rem;font-weight:700;color:#aac;letter-spacing:.1em;text-transform:uppercase}

  .no-winner-info{background:rgba(255,100,100,.08);border:1.5px solid rgba(255,100,100,.2);border-radius:12px;padding:1rem 1.4rem;margin:1rem 0 1.4rem;font-size:.85rem;color:#ffaaaa;font-weight:700;letter-spacing:.04em}

  .draw-history{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:1rem 1.2rem;margin-bottom:1.2rem;max-height:180px;overflow-y:auto}
  .draw-history::-webkit-scrollbar{width:4px}
  .draw-history::-webkit-scrollbar-thumb{background:var(--blue);border-radius:10px}
  .draw-history-title{font-size:.65rem;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:#556;margin-bottom:.6rem}
  .draw-history-item{display:flex;align-items:center;gap:.7rem;padding:.4rem 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.82rem;font-weight:700}
  .draw-history-item:last-child{border-bottom:none}
  .draw-history-item .dhi-num{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--red);letter-spacing:.05em;min-width:3rem}
  .draw-history-item .dhi-reason{color:#667;font-size:.74rem;font-style:italic}

  .result-actions{display:flex;gap:.8rem;flex-wrap:wrap}
  .btn-resortear{flex:1;padding:.9rem 1.5rem;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);border-radius:8px;color:#ccd;font-family:'Nunito',sans-serif;font-weight:900;font-size:.85rem;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.5rem}
  .btn-resortear:hover{background:rgba(255,255,255,.13);border-color:rgba(255,255,255,.25)}
  .btn-novo{flex:1;padding:.9rem 1.5rem;background:linear-gradient(135deg,var(--red),#B01D2B);border:none;border-radius:8px;color:#fff;font-family:'Nunito',sans-serif;font-weight:900;font-size:.85rem;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.5rem;box-shadow:0 4px 18px rgba(215,38,56,.4)}
  .btn-novo:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(215,38,56,.5)}

  .confetti-piece{position:fixed;top:-10px;width:10px;height:10px;opacity:0;animation:confettiFall linear forwards;pointer-events:none;z-index:9999;border-radius:2px}
  @keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}

  #toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--blue);color:#fff;padding:.8rem 1.8rem;border-radius:30px;font-weight:700;font-size:.88rem;letter-spacing:.05em;box-shadow:0 4px 24px rgba(0,0,0,.4);transition:transform .35s cubic-bezier(.34,1.56,.64,1);z-index:999;white-space:nowrap}
  #toast.show{transform:translateX(-50%) translateY(0)}

  @media(max-width:520px){.card{padding:1.2rem 1rem}.turma-grid{gap:.7rem}.number-grid{gap:.4rem}.rifa-num{font-size:1.3rem}.slot-window{width:200px}.slot-num{font-size:3.5rem}}
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="badge">🎟 Sistema de Rifas Oficial</div>
    <h1>RIFA<br/><span>3º ANO</span></h1>
    <p class="sub">Turmas A &amp; B &nbsp;·&nbsp; Cada número vale R$&nbsp;5,00</p>
  </header>
  <div class="stripe"><span></span><span></span><span></span></div>

  <!-- TABS -->
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('numeros',this)">🎟 Meus Números</button>
    <button class="nav-tab" onclick="showPage('sorteio',this)">🎲 Sorteio</button>
  </div>

  <!-- ══════════ PAGE: NÚMEROS ══════════ -->
  <div class="page active" id="page-numeros">

    <div class="card" id="step1">
      <div class="step-label">Passo 01</div>
      <h2>Selecione sua Turma</h2>
      <div class="turma-grid">
        <button class="turma-btn a" onclick="selectTurma('A',this)">3º A<small>41 alunos</small></button>
        <button class="turma-btn b" onclick="selectTurma('B',this)">3º B<small>39 alunos</small></button>
      </div>
    </div>

    <div class="card" id="step2" style="display:none">
      <div class="step-label">Passo 02</div>
      <h2>Encontre seu Nome</h2>
      <div class="search-wrap">
        <span class="icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Digite seu nome..." oninput="filterNames()"/>
      </div>
      <div id="nameList"></div>
    </div>

    <div id="ticketSection">
      <div class="card" style="padding:0;overflow:hidden">
        <div id="ticketCard">
          <div class="ticket-header">
            <div class="ticket-title">Seus<br/><span>Números</span></div>
            <div class="ticket-turma-badge" id="tc-turma">3º A</div>
          </div>
          <div class="unique-badge">✅ Números 100% exclusivos — sem repetição</div>
          <div class="ticket-name">
            <small>Vendedor(a)</small>
            <span id="tc-name">—</span>
          </div>
          <div class="ticket-info">
            <div><div class="val">10</div><div class="lbl">Números</div></div>
            <d
